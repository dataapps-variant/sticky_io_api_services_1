# ---------------------------------------------------------------------------
# App registry: one entry per sticky.io application (merchant account).
# Replaces the old Airbyte connector. Each app gets its OWN BigQuery table:
#   orders_<name>
#
# For each app:
#   name            -> table name becomes orders_<name>  (letters/digits/_ only)
#   company         -> the sticky.io subdomain: https://<company>.sticky.io
#                      *** REPLACE the REPLACE_WITH_* values with the real ones ***
#   cred_secret     -> Secret Manager secret holding "username:password"
#   source_timezone -> timezone sticky.io reports order times in (verify once)
#   report_timezone -> timezone used for date_of_sale
#   campaign_id     -> usually "all"
#
# Run ONE app:   /run?mode=backfill&company=ct&token=...
# Run ALL apps:  /run?mode=backfill&company=all&token=...   (loops every app below)
# ---------------------------------------------------------------------------
apps:
  - name: ct
    company: mindworksllc
    cred_secret: sticky-cred-ct
    source_timezone: America/New_York
    report_timezone: America/New_York
    campaign_id: all

